<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUG: A MATHEMATICAL GAME</title>
  <link rel="stylesheet" href="tug-of-war.css" />
</head>
<body>

  <!-- Top Header (like reference UI) -->
  <header class="app-header">
    <a class="home-btn" href="index.html">🏠 HOME</a>
    <h1 class="app-title">TUG: A MATHEMATICAL GAME</h1>
  </header>

  <!-- Main Layout -->
  <main class="layout">

    <!-- LEFT: Team 1 (Blue) -->
    <section class="team-panel blue" id="teamBlue">
      <div class="panel-top">
        <div class="team-name">1st Team</div>
        <div class="team-score"><span id="blueScore">0</span></div>
      </div>

      <div class="question" id="blueQuestion">7 + 4 = ?</div>

      <div class="display-wrap">
        <input id="blueDisplay" class="display" type="text" value="" placeholder="0" readonly />
      </div>

      <div class="keypad" id="bluePad">
        <!-- digits -->
        <button class="key" data-digit="1">1</button>
        <button class="key" data-digit="2">2</button>
        <button class="key" data-digit="3">3</button>
        <button class="key" data-digit="4">4</button>
        <button class="key" data-digit="5">5</button>
        <button class="key" data-digit="6">6</button>
        <button class="key" data-digit="7">7</button>
        <button class="key" data-digit="8">8</button>
        <button class="key" data-digit="9">9</button>

        <!-- actions -->
        <button class="key action danger" data-action="clear">✕</button>
        <button class="key" data-digit="0">0</button>
        <button class="key action ok" data-action="submit">✓</button>
      </div>

      <div class="hint" id="blueHint">Your turn ✅</div>
    </section>

    <!-- CENTER: Video Box -->
    <section class="center-panel">
      <div class="center-top">
        <div class="mini-score">
          <div class="mini-label">1st Team</div>
          <div class="mini-value" id="miniBlue">0</div>
        </div>

        <div class="timer" id="timer">00:00</div>

        <div class="mini-score">
          <div class="mini-label">2nd Team</div>
          <div class="mini-value" id="miniRed">0</div>
        </div>
      </div>

      <div class="video-container" id="videoContainer">
        <div class="dashed-line"></div>
        <video id="tugVideo" class="tug-video" loop muted playsinline>
          <source src="main.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <div class="video-overlay" id="videoOverlay"></div>
      </div>

      <div class="center-bottom">
        <div class="turn-pill" id="turnPill">BLUE TURN</div>
        <button class="restart" id="restartBtn">Restart</button>
      </div>
    </section>

    <!-- RIGHT: Team 2 (Red) -->
    <section class="team-panel red" id="teamRed">
      <div class="panel-top">
        <div class="team-name">2nd Team</div>
        <div class="team-score"><span id="redScore">0</span></div>
      </div>

      <div class="question" id="redQuestion">9 + 6 = ?</div>

      <div class="display-wrap">
        <input id="redDisplay" class="display" type="text" value="" placeholder="0" readonly />
      </div>

      <div class="keypad" id="redPad">
        <!-- digits -->
        <button class="key" data-digit="1">1</button>
        <button class="key" data-digit="2">2</button>
        <button class="key" data-digit="3">3</button>
        <button class="key" data-digit="4">4</button>
        <button class="key" data-digit="5">5</button>
        <button class="key" data-digit="6">6</button>
        <button class="key" data-digit="7">7</button>
        <button class="key" data-digit="8">8</button>
        <button class="key" data-digit="9">9</button>

        <!-- actions -->
        <button class="key action danger" data-action="clear">✕</button>
        <button class="key" data-digit="0">0</button>
        <button class="key action ok" data-action="submit">✓</button>
      </div>

      <div class="hint" id="redHint">Wait… ⏳</div>
    </section>
    <!-- Draw Popup -->
    <div class="draw-popup" id="drawPopup">
      <div class="draw-popup-content">
        <h2>🎉 WELL PLAYED! 🎉</h2>
        <p>It's a draw! Both teams showed great skill!</p>
        <button class="draw-popup-close" id="closeDrawPopup">Continue</button>
      </div>
    </div>

  </main>

  <script src="tug-of-war.js"></script>
</body>
</html>
