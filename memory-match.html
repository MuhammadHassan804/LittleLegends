<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Fun 🧠✨</title>
    <link rel="stylesheet" href="memory-match.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <h1 class="game-title">🧠 Memory Match Fun!</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="moves">0</span>
                    <span class="stat-label">Moves</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="matches">0</span>
                    <span class="stat-label">Matches</span>
                </div>
            </div>
        </header>

        <!-- Game Board -->
        <main class="game-board" id="gameBoard">
            <!-- Cards will be generated by JavaScript -->
        </main>

        <!-- Controls -->
        <div class="game-controls">
            <button class="btn btn-primary" id="restartBtn">🔄 New Game</button>
            <button class="btn btn-secondary" id="homeBtn">🏠 Home</button>
        </div>
    </div>

    <!-- Win Modal -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎉 You Win!</h2>
            </div>
            <p class="modal-message">
                Great job! Your memory is amazing! 🧠✨
            </p>
            <div class="modal-stats">
                <div><span id="finalMoves">0</span> moves</div>
                <div><span id="finalMatches">0</span> matches</div>
            </div>
            <button class="btn btn-large btn-primary" id="playAgainBtn">Play Again 🎮</button>
        </div>
    </div>

    <script src="memory-match.js"></script>
</body>
</html>
