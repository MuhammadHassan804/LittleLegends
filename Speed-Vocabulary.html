<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>Speed Vocabulary Race - Kids Word Game</title>
  <link rel="stylesheet" href="Speed-Vocabulary.css" />
</head>
<body>
  <!-- Header with Home Button -->
  <header class="game-header">
    <a href="index.html" class="home-btn">🏠 Home</a>
    <h1 class="game-title">🚀 SPEED VOCABULARY RACE</h1>
    <div class="difficulty-selector">
      <select id="difficultyLevel" class="difficulty-dropdown">
        <option value="easy">😊 Easy</option>
        <option value="medium" selected>⚡ Medium</option>
        <option value="hard">🔥 Hard</option>
      </select>
    </div>
  </header>

  <!-- Main Game Container -->
  <main class="game-container">
    <!-- Top Stats Bar -->
    <div class="stats-bar">
      <div class="score-box">
        <span class="stats-label">Score</span>
        <span class="stats-value" id="scoreDisplay">0</span>
      </div>
      <div class="timer-box">
        <span class="stats-label">Time</span>
        <span class="stats-value" id="timerDisplay">10</span>
        <span class="timer-unit">sec</span>
      </div>
      <div class="question-box">
        <span class="stats-label">Question</span>
        <span class="stats-value" id="questionCounter">1/10</span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Word Display Area -->
    <div class="word-area">
      <div class="word-card" id="wordCard">
        <span class="big-word" id="currentWord">Happy</span>
      </div>
      <div class="rocket-animation" id="rocketAnimation">🚀</div>
    </div>

    <!-- Options Container (4 Buttons) -->
    <div class="options-grid" id="optionsContainer">
      <!-- Buttons will be generated by JavaScript -->
    </div>

    <!-- Message Display (for time up / feedback) -->
    <div class="message-banner" id="messageBanner"></div>
  </main>

  <!-- Result Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-content">
      <h2 class="modal-title">🏁 Race Complete! 🏁</h2>
      <div class="modal-stats">
        <div class="modal-stat-item">
          <span class="modal-stat-label">Final Score</span>
          <span class="modal-stat-value" id="finalScore">0</span>
        </div>
        <div class="modal-stat-item">
          <span class="modal-stat-label">Percentage</span>
          <span class="modal-stat-value" id="finalPercentage">0%</span>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn play-again" id="playAgainBtn">🔄 Play Again</button>
        <button class="modal-btn home-btn" id="homeBtn">🏠 Home</button>
      </div>
    </div>
  </div>

  <!-- Confetti Canvas (hidden by default) -->
  <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

  <script src="Speed-Vocabulary.js"></script>
</body>
</html>
